<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <link rel="icon" type="image/svg+xml" href="favicon.svg" />
        <link rel="apple-touch-icon" sizes="128x128" href="icons/icon-128.png" />
        <link rel="apple-touch-icon" sizes="256x256" href="icons/icon-256.png" />
        <title>Microsoft Edge Surf 2 | Offline</title>
        <style>
            * {
                font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell,
                    "Open Sans", "Helvetica Neue", sans-serif;
            }
            html {
                text-align: center;
                padding: 50px;
                background-color: #224e55;
            }
            h2 {
                color: #fff;
                margin-bottom: 20px;
            }
            button {
                padding: 10px 20px;
                font-size: 16px;
                cursor: pointer;
                border: none;
                background-color: #0078d7;
                color: #fff;
                border-radius: 4px;
                font-weight: 700;
            }
            button:hover {
                background-color: #005fa3;
            }
        </style>
    </head>
    <body>
        <h2>You are offline. Check your Internet connection and try again.</h2>
        <button type="button" id="retry">Try again</button>

        <script>
            // When the user clicks "Try again", check if they are online and reload the page if so.
            document.getElementById("retry").addEventListener("click", function () {
                if (navigator.onLine) {
                    // Reload the page if online.
                    location.href = "./index.html";
                } else {
                    // Notify the user that the connection is still offline.
                    alert("Still offline. Please check your internet connection.");
                }
            });
        </script>
    </body>
</html>
