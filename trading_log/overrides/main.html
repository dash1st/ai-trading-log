{% extends "base.html" %}

{% block analytics %}
  <!-- Google Analytics Add-on (사용 시 ID 교체) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>
{% endblock %}

{% block content %}
  {{ super() }}
  
  <br><br>
  <hr>
  
  <!-- HITS Badge Add-on -->
  <div style="text-align: center; margin-bottom: 20px;">
    <a href="https://hits.seeyoufarm.com">
      <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url={{ config.site_url|urlencode }}&count_bg=%2379C83D&title_bg=%23555555&icon=&icon_color=%23E7E7E7&title=hits&edge_flat=false" alt="Hits Badge"/>
    </a>
  </div>

  <!-- Giscus Guestbook Add-on -->
  <div class="giscus"></div>
  <script src="https://giscus.app/client.js"
        data-repo="dash1st/ai-trading-log"
        data-repo-id="R_kgDORbOAtw"
        data-category="General"
        data-mapping="pathname"
        data-strict="0"
        data-reactions-enabled="1"
        data-emit-metadata="0"
        data-input-position="bottom"
        data-theme="light"
        data-lang="ko"
        crossorigin="anonymous"
        async>
  </script>
{% endblock %}
