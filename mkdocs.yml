site_name: AI 트레이딩 봇 모의투자 일지
site_url: http://localhost:8000
site_description: 트레이딩 봇의 모의투자 결과, 백테스트, 전략 분석 리포트 보관소

theme:
  name: material
  language: ko
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    # 🌙 기본 다크 모드 (사용자가 좋아할 멋진 디자인)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    # ☀️ 라이트 모드 지원
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true 
  - pymdownx.magiclink
  - pymdownx.tasklist:
      custom_checkbox: true

nav:
  - 🏠 홈: index.md
  - 📈 매매 일지:
    - 2026년 2월: logs/2026-02.md
  - 🧠 트레이딩 전략:
    - Casper FVG 전략: strategy/casper_fvg.md
    - Ross Cameron 돌파 전략: strategy/ross_cameron.md
